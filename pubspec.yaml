name: moodoo
description: "track your days, create your own mood calendar with moodoo"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  intl: ^0.20.1
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.5
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  google_sign_in: ^7.2.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon_light.png"
  image_path_ios_dark_transparent: "assets/icons/app_icon_dark.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logos/moodoo-cow-dark.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/logos/
    - assets/icons/
